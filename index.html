<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloRyda</title>
    <link rel="stylesheet" href="/src/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans overflow-hidden select-none">
    <!-- Game Canvas -->
    <canvas id="gameCanvas" class="fixed inset-0 w-full h-full cursor-crosshair"></canvas>

    <!-- UI Overlay -->
    <div id="ui-root" class="fixed inset-0 pointer-events-none flex flex-col p-6">
        <!-- Top Bar -->
        <div class="flex justify-between items-start pointer-events-auto">
            <div class="flex flex-col gap-1">
                <h1 class="text-2xl font-extrabold tracking-tighter uppercase italic text-emerald-400">FloRyda</h1>
                <div id="game-mode-label" class="text-[10px] font-mono uppercase tracking-widest text-zinc-500">Free Play Mode</div>
            </div>
            
            <div class="flex gap-4 items-center">
                <div id="score-container" class="hidden flex-col items-end">
                    <span class="text-[10px] font-mono uppercase tracking-widest text-zinc-500">Distance</span>
                    <span id="score-value" class="text-3xl font-bold font-mono">0.0m</span>
                </div>
                <div id="auth-status" class="flex items-center gap-3 bg-zinc-900/50 backdrop-blur-md border border-white/5 px-4 py-2 rounded-full">
                    <span id="user-name" class="text-sm font-medium">Guest</span>
                    <button id="login-btn" class="text-xs font-bold uppercase tracking-wider text-emerald-400 hover:text-emerald-300 transition-colors">Login</button>
                </div>
            </div>
        </div>

        <!-- Center Message (for crashes/wins) -->
        <div id="center-message" class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-0 transition-opacity duration-300">
            <div class="bg-zinc-900/90 backdrop-blur-xl border border-white/10 p-8 rounded-3xl shadow-2xl text-center">
                <h2 id="message-title" class="text-4xl font-black uppercase italic mb-2">Crashed!</h2>
                <p id="message-body" class="text-zinc-400 mb-6">You traveled 0.0m</p>
                <button id="message-action" class="bg-emerald-500 hover:bg-emerald-400 text-zinc-950 font-bold px-8 py-3 rounded-xl transition-all pointer-events-auto">Try Again</button>
            </div>
        </div>

        <!-- Bottom Controls -->
        <div class="mt-auto flex justify-between items-end pointer-events-auto">
            <!-- Left: Mode Selection -->
            <div class="flex flex-col gap-4">
                <div class="flex gap-2 bg-zinc-900/50 backdrop-blur-md border border-white/5 p-1.5 rounded-2xl">
                    <button id="btn-freeplay" class="px-4 py-2 rounded-xl text-sm font-bold transition-all bg-emerald-500 text-zinc-950">Free Play</button>
                    <button id="btn-challenge" class="px-4 py-2 rounded-xl text-sm font-bold transition-all hover:bg-white/5 text-zinc-400">Challenges</button>
                </div>
                
                <div class="flex gap-2 bg-zinc-900/50 backdrop-blur-md border border-white/5 p-1.5 rounded-2xl">
                    <button id="btn-draw-free" class="px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-wider transition-all bg-emerald-500 text-zinc-950">Free Draw</button>
                    <button id="btn-draw-straight" class="px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-wider transition-all hover:bg-white/5 text-zinc-400">Straight Line</button>
                    <button id="btn-draw-eraser" class="px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-wider transition-all hover:bg-white/5 text-zinc-400">Eraser</button>
                </div>
            </div>

            <!-- Center: Playback Controls -->
            <div class="absolute left-1/2 -translate-x-1/2 flex gap-3 bg-zinc-900/80 backdrop-blur-xl border border-white/10 p-2 rounded-3xl shadow-2xl">
                <button id="btn-undo" class="w-12 h-12 flex items-center justify-center bg-zinc-800 hover:bg-zinc-700 text-white rounded-2xl transition-all disabled:opacity-30 disabled:cursor-not-allowed" title="Undo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
                </button>
                <button id="btn-redo" class="w-12 h-12 flex items-center justify-center bg-zinc-800 hover:bg-zinc-700 text-white rounded-2xl transition-all disabled:opacity-30 disabled:cursor-not-allowed" title="Redo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg>
                </button>
                <div class="w-px h-8 bg-white/10 self-center mx-1"></div>
                <button id="btn-play" class="w-14 h-14 flex items-center justify-center bg-emerald-500 hover:bg-emerald-400 text-zinc-950 rounded-2xl transition-all shadow-lg shadow-emerald-500/20">
                    <svg id="icon-play" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="m7 3 14 9-14 9V3z"/></svg>
                    <svg id="icon-pause" class="hidden" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                </button>
                <button id="btn-reset" class="w-14 h-14 flex items-center justify-center bg-zinc-800 hover:bg-zinc-700 text-white rounded-2xl transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>
                <button id="btn-clear" class="w-14 h-14 flex items-center justify-center bg-zinc-800 hover:bg-zinc-700 text-white rounded-2xl transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
                </button>
            </div>

            <!-- Right: Leaderboard Toggle -->
            <button id="btn-leaderboard" class="bg-zinc-900/50 backdrop-blur-md border border-white/5 p-4 rounded-2xl hover:bg-white/5 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
            </button>
        </div>
    </div>

    <!-- Challenge Menu Modal -->
    <div id="challenge-menu" class="fixed inset-0 bg-zinc-950/80 backdrop-blur-md flex items-center justify-center hidden z-50">
        <div class="bg-zinc-900 border border-white/10 p-8 rounded-3xl shadow-2xl w-full max-w-2xl max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black uppercase italic tracking-tighter">Select Challenge</h2>
                <button id="close-challenge-menu" class="text-zinc-500 hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
            <div id="challenge-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Challenges will be injected here -->
            </div>
        </div>
    </div>

    <!-- Leaderboard Modal -->
    <div id="leaderboard-modal" class="fixed inset-0 bg-zinc-950/80 backdrop-blur-md flex items-center justify-center hidden z-50">
        <div class="bg-zinc-900 border border-white/10 p-8 rounded-3xl shadow-2xl w-full max-w-md">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black uppercase italic tracking-tighter">Leaderboard</h2>
                <button id="close-leaderboard" class="text-zinc-500 hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
            <div id="leaderboard-content" class="space-y-2">
                <!-- Scores will be injected here -->
                <div class="text-center py-8 text-zinc-500 italic">Select a challenge to see scores</div>
            </div>
        </div>
    </div>

    <!-- Game Scripts -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
